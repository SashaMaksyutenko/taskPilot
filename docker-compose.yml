# docker-compose.yml
# Локальна інфраструктура для розробки Taskpilot:
#   - PostgreSQL : основна база даних
#   - Redis      : кеш + presence (online/offline статуси)
#   - RabbitMQ   : черга повідомлень між API та NotificationService
# Запуск:   docker-compose up -d
# Зупинка:  docker-compose down

services:
  # ---- База даних PostgreSQL ----
  postgres:
    image: postgres:16
    container_name: taskpilot-postgres
    environment:
      POSTGRES_DB: taskpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Зберігаємо дані БД між перезапусками контейнера
      - postgres_data:/var/lib/postgresql/data
    # Дозволяємо api дочекатися, поки база буде готова приймати підключення
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Backend API (ASP.NET Core) ----
  # Секрети (JWT_KEY, ADMIN_PASSWORD) беруться з кореневого .env через підстановку
  # ${...} — у git комітимо лише .env.example. Рядок підключення вказує на сервіс
  # postgres усередині docker-мережі (host = "postgres", порт 5432).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskpilot-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=taskpilot;Username=postgres;Password=postgres"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "Taskpilot.API"
      Jwt__Audience: "Taskpilot.Client"
      Admin__Email: "${ADMIN_EMAIL:-admin@taskpilot.local}"
      Admin__Password: "${ADMIN_PASSWORD}"
      Admin__Name: "Administrator"
      # With a broker set the API PUBLISHES out-of-band delivery to the queue for the
      # notification-service to consume (host = the "rabbitmq" service on the docker network).
      RabbitMq__Connection: "amqp://guest:guest@rabbitmq:5672"
      # Email goes to the MailHog fake SMTP so it is visible at http://localhost:8025.
      Email__SmtpHost: "mailhog"
      Email__SmtpPort: "1025"
      Email__SmtpUseSsl: "false"
      Email__FromEmail: "no-reply@taskpilot.local"
      Email__FromName: "TaskPilot"

  # ---- Notification microservice (background worker) ----
  # Consumes queued notification deliveries from RabbitMQ and sends them over email/Telegram/
  # Viber, off the API's request path. Shares only the wire contract + senders with the API.
  notification-service:
    build:
      context: .
      dockerfile: src/Taskpilot.NotificationService/Dockerfile
    container_name: taskpilot-notification-service
    depends_on:
      - rabbitmq
      - mailhog
    environment:
      RabbitMq__Connection: "amqp://guest:guest@rabbitmq:5672"
      Email__SmtpHost: "mailhog"
      Email__SmtpPort: "1025"
      Email__SmtpUseSsl: "false"
      Email__FromEmail: "no-reply@taskpilot.local"
      Email__FromName: "TaskPilot"

  # ---- MailHog: a fake SMTP server for the demo ----
  # Catches every outgoing email so the notification flow is visible in a browser
  # (web UI + API at http://localhost:8025); SMTP itself listens on 1025.
  mailhog:
    image: mailhog/mailhog
    container_name: taskpilot-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---- Frontend (React SPA за nginx) ----
  # nginx віддає статичний build і проксить /api та /hubs на сервіс api, тож
  # браузер працює з одним origin (без CORS). VITE_API_URL порожній => відносні URL.
  frontend:
    build:
      context: ./src/Taskpilot.Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: taskpilot-frontend
    depends_on:
      - api
    ports:
      - "3000:80"

  # ---- Кеш Redis ----
  redis:
    image: redis:7
    container_name: taskpilot-redis
    ports:
      - "6379:6379"

  # ---- Брокер черг RabbitMQ (з веб-панеллю керування) ----
  rabbitmq:
    image: rabbitmq:3-management
    container_name: taskpilot-rabbitmq
    ports:
      - "5672:5672"     # порт для застосунків (AMQP)
      - "15672:15672"   # веб-панель: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

# Іменований том для постійного зберігання даних PostgreSQL
volumes:
  postgres_data:
