# docker-compose.yml
# Локальна інфраструктура для розробки Taskpilot:
#   - PostgreSQL : основна база даних
#   - Redis      : кеш + presence (online/offline статуси)
#   - RabbitMQ   : черга повідомлень між API та NotificationService
# Запуск:   docker-compose up -d
# Зупинка:  docker-compose down

services:
  # ---- База даних PostgreSQL ----
  postgres:
    image: postgres:16
    container_name: taskpilot-postgres
    environment:
      POSTGRES_DB: taskpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Зберігаємо дані БД між перезапусками контейнера
      - postgres_data:/var/lib/postgresql/data
    # Дозволяємо api дочекатися, поки база буде готова приймати підключення
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Backend API (ASP.NET Core) ----
  # Секрети (JWT_KEY, ADMIN_PASSWORD) беруться з кореневого .env через підстановку
  # ${...} — у git комітимо лише .env.example. Рядок підключення вказує на сервіс
  # postgres усередині docker-мережі (host = "postgres", порт 5432).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskpilot-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=taskpilot;Username=postgres;Password=postgres"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "Taskpilot.API"
      Jwt__Audience: "Taskpilot.Client"
      Admin__Email: "${ADMIN_EMAIL:-admin@taskpilot.local}"
      Admin__Password: "${ADMIN_PASSWORD}"
      Admin__Name: "Administrator"

  # ---- Кеш Redis ----
  redis:
    image: redis:7
    container_name: taskpilot-redis
    ports:
      - "6379:6379"

  # ---- Брокер черг RabbitMQ (з веб-панеллю керування) ----
  rabbitmq:
    image: rabbitmq:3-management
    container_name: taskpilot-rabbitmq
    ports:
      - "5672:5672"     # порт для застосунків (AMQP)
      - "15672:15672"   # веб-панель: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

# Іменований том для постійного зберігання даних PostgreSQL
volumes:
  postgres_data:
